# CI/CD for sql-sp-harness (PyPA guide):
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
#
# - Every PR / branch push: run tests
# - Every branch push (not a tag): build + twine check + publish to TestPyPI
# - Tag push v* (or workflow_dispatch → pypi): build + publish to PyPI
#
# Trusted publishers (one-time):
#   PyPI:      https://pypi.org/manage/account/publishing/  → environment "pypi"
#   TestPyPI:  https://test.pypi.org/manage/account/publishing/ → environment "testpypi"
#   Workflow file: publish-pypi.yml

name: Publish to PyPI

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  push:
    branches: [master, main, release]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target (manual runs only)"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions (twine check)
        run: python -m twine check dist/*

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: >-
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sql-sp-harness/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sql-sp-harness/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
